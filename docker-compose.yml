services:
  postgres:
    image: postgres:17-alpine
    container_name: v_o_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-v_o_db}
      POSTGRES_USER: ${POSTGRES_USER:-v_o_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-v_o_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-v_o_user} -d ${POSTGRES_DB:-v_o_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v_o_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-v_o_db}
      DB_USER: ${POSTGRES_USER:-v_o_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-v_o_password}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres_data:
